<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>신세계 콜센터 공지사항</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#020617;--bg2:#0f172a;--card:#1e293b;--card2:#162032;
  --border:#334155;--accent:#60a5fa;--text:#e5e7eb;--dim:#94a3b8;--muted:#475569;
  --blue:#93c5fd;--font:'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',Arial,sans-serif;
}
html,body{width:1920px;height:1080px;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font)}

/* ── MAIN ── */
#mainPage{width:1920px;height:1080px;display:flex;flex-direction:column}
.main-hdr{
  height:88px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:0 40px;background:rgba(15,23,42,.95);border-bottom:2px solid var(--border);
}
.main-logo{font-size:26px;font-weight:900;color:var(--blue)}
.main-right{display:flex;align-items:center;gap:24px}
.main-datetime{text-align:right}
.main-time{font-size:56px;font-weight:900;color:var(--blue);letter-spacing:4px;line-height:1;font-variant-numeric:tabular-nums}
.main-date{font-size:15px;color:var(--dim);margin-top:2px}
.edit-btn{padding:9px 22px;border-radius:9px;border:1.5px solid var(--border);background:transparent;color:var(--dim);font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);transition:all .15s}
.edit-btn:hover{border-color:var(--accent);color:var(--blue)}
.notice-grid{flex:1;min-height:0;display:grid}

/* 카드 */
.store-card{display:flex;flex-direction:column;border-right:2px solid var(--border);border-bottom:2px solid var(--border);background:var(--card2);overflow:hidden;position:relative}
.store-card:last-child{border-right:none}
.store-hdr{flex-shrink:0;display:flex;align-items:center;gap:12px;padding:0 24px;border-bottom:1.5px solid var(--border);background:rgba(30,41,59,.8)}
.store-body{flex:1;min-height:0;overflow:hidden;display:flex;flex-direction:column;justify-content:center}
.notice-item{display:flex;gap:12px;align-items:flex-start;border-bottom:1px solid rgba(51,65,85,.5)}
.notice-item:last-child{border-bottom:none}
.notice-num{flex-shrink:0;display:flex;align-items:center;justify-content:center;border-radius:5px;font-weight:900;color:var(--accent);background:rgba(96,165,250,.12);border:1px solid rgba(96,165,250,.2)}
.notice-text{flex:1;font-weight:600;line-height:1.6;word-break:keep-all}
.notice-ts{flex-shrink:0;color:var(--dim);text-align:right}
.empty-state{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--muted)}

/* ── EDIT ── */
#editPage{width:1920px;height:1080px;display:none;flex-direction:column;background:radial-gradient(ellipse at top,var(--bg2),var(--bg) 70%)}
.edit-hdr{height:64px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 40px;background:rgba(15,23,42,.95);border-bottom:1px solid var(--border)}
.edit-logo{font-size:20px;font-weight:900;color:var(--blue)}
.back-btn{padding:8px 20px;border-radius:9px;border:1.5px solid var(--accent);background:rgba(96,165,250,.1);color:var(--blue);font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font)}
.back-btn:hover{background:rgba(96,165,250,.2)}
.edit-body{flex:1;min-height:0;display:grid;grid-template-columns:280px 1fr;overflow:hidden}

/* 사이드바 */
.sidebar{border-right:1px solid var(--border);display:flex;flex-direction:column;background:rgba(15,23,42,.5)}
.sb-hdr{padding:16px 18px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-title{font-size:12px;font-weight:800;color:var(--dim);text-transform:uppercase;letter-spacing:.6px}
.sb-hint{font-size:10px;color:var(--muted);margin-top:3px}
.store-list{flex:1;overflow-y:auto;padding:8px 10px;display:flex;flex-direction:column;gap:3px}
.store-item{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:8px;border:1.5px solid transparent;cursor:pointer;transition:all .13s;user-select:none}
.store-item:hover{background:rgba(255,255,255,.04)}
.store-item.active{border-color:var(--accent);background:rgba(96,165,250,.07)}
.store-item.visible{border-color:rgba(52,211,153,.5);background:rgba(52,211,153,.06)}
.store-item.active.visible{border-color:#34d399}
.si-check{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--border);background:transparent;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px}
.store-item.visible .si-check{background:#34d399;border-color:#34d399;color:#fff}
.si-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.si-name{font-size:14px;font-weight:800;flex:1}
.si-cnt{font-size:11px;color:var(--dim);font-weight:700}

/* 에디터 영역 */
.edit-main{display:flex;flex-direction:column;overflow:hidden;padding:18px 26px;gap:12px}

/* 폰트 크기 패널 */
.font-panel{background:var(--card2);border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;flex-shrink:0}
.fp-title{font-size:10px;font-weight:800;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}
.fp-btns{display:flex;gap:3px;flex-wrap:wrap;align-items:center}
.fp-btn{padding:3px 8px;border-radius:5px;border:1.5px solid var(--border);background:transparent;color:var(--dim);font-size:10px;font-weight:800;cursor:pointer;font-family:var(--font);transition:all .12s}
.fp-btn.active{border-color:var(--accent);background:rgba(96,165,250,.12);color:var(--blue)}
.fp-cur{font-size:12px;font-weight:800;color:var(--blue);margin-left:8px}

/* 색상 툴바 */
.color-bar{display:flex;align-items:center;gap:6px;flex-shrink:0;padding:8px 12px;background:rgba(15,23,42,.7);border:1px solid var(--border);border-radius:8px;flex-wrap:wrap}
.cb-label{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
.cb-sep{width:1px;height:16px;background:var(--border);flex-shrink:0}
.cb-swatch{width:22px;height:22px;border-radius:5px;border:2px solid transparent;cursor:pointer;transition:all .12s;flex-shrink:0}
.cb-swatch:hover{transform:scale(1.18);border-color:rgba(255,255,255,.4)}
.cb-picker{width:22px;height:22px;border-radius:5px;border:1.5px solid var(--border);cursor:pointer;padding:1px;background:transparent;flex-shrink:0}
.cb-clear{padding:3px 10px;border-radius:5px;border:1.5px solid var(--border);background:transparent;color:var(--dim);font-size:10px;font-weight:800;cursor:pointer;font-family:var(--font);white-space:nowrap}
.cb-clear:hover{border-color:#f87171;color:#f87171}
.cb-hint{font-size:10px;color:var(--muted);font-style:italic;white-space:nowrap}

/* 공지 에디터 */
.notices-wrap{flex:1;min-height:0;overflow-y:auto;display:flex;flex-direction:column;gap:8px}
.notice-row{display:flex;gap:10px;align-items:flex-start;background:var(--card2);border:1.5px solid var(--border);border-radius:10px;padding:11px 13px;transition:border-color .13s}
.notice-row:focus-within{border-color:var(--accent)}
.nr-num{flex-shrink:0;width:26px;height:26px;border-radius:5px;background:rgba(96,165,250,.12);border:1px solid rgba(96,165,250,.2);color:var(--accent);font-size:12px;font-weight:900;display:flex;align-items:center;justify-content:center;margin-top:3px}
.nr-editor{
  flex:1;min-height:56px;outline:none;
  font-family:var(--font);font-size:14px;font-weight:600;line-height:1.6;
  color:var(--text);word-break:keep-all;
  border:none;background:transparent;
}
.nr-editor:empty::before{content:attr(placeholder);color:var(--muted);pointer-events:none;display:block}
.nr-del{flex-shrink:0;width:24px;height:24px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;margin-top:3px;transition:all .12s}
.nr-del:hover{border-color:#f87171;color:#f87171;background:rgba(248,113,113,.1)}
.add-btn{flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:6px;padding:9px;border-radius:9px;border:1.5px dashed var(--border);background:transparent;color:var(--dim);font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);transition:all .13s}
.add-btn:hover{border-color:var(--accent);color:var(--blue)}
.edit-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--muted)}

/* visible 토글 버튼 */
.vis-btn{padding:5px 13px;border-radius:7px;font-size:11px;font-weight:800;cursor:pointer;font-family:var(--font);transition:all .13s;border:1.5px solid var(--border);background:transparent;color:var(--dim)}
.vis-btn.on{border-color:#34d399;background:rgba(52,211,153,.12);color:#34d399}

/* 모달 */
.ov{position:fixed;inset:0;background:rgba(2,6,23,.85);backdrop-filter:blur(5px);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .17s}
.ov.open{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border:1.5px solid var(--accent);border-radius:16px;padding:28px;width:360px;transform:translateY(14px);transition:transform .17s;box-shadow:0 20px 60px rgba(0,0,0,.7)}
.ov.open .modal{transform:translateY(0)}
.modal-t{font-size:18px;font-weight:800;color:var(--blue);margin-bottom:4px}
.modal-s{font-size:12px;color:var(--dim);margin-bottom:18px}
.pw-inp{width:100%;background:var(--card2);border:1.5px solid var(--border);border-radius:9px;color:var(--text);font-family:var(--font);font-size:22px;letter-spacing:8px;text-align:center;padding:13px;outline:none;transition:border-color .15s;margin-bottom:8px}
.pw-inp:focus{border-color:var(--accent)}
.pw-err{font-size:12px;color:#f87171;text-align:center;height:18px;margin-bottom:10px}
.modal-acts{display:flex;gap:8px;justify-content:flex-end}
.btn{padding:9px 20px;border-radius:8px;font-size:12px;font-weight:800;cursor:pointer;border:none;font-family:var(--font)}
.btn-c{background:var(--card);color:var(--dim)}.btn-c:hover{color:var(--text)}
.btn-s{background:var(--accent);color:#fff}.btn-s:hover{opacity:.85}
.pw-link{font-size:11px;color:var(--dim);text-align:center;cursor:pointer;text-decoration:underline;margin-top:8px;display:block}
.pw-link:hover{color:var(--blue)}

::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

<!-- MAIN -->
<div id="mainPage">
  <div class="main-hdr">
    <div class="main-logo">📢 신세계 콜센터 공지사항</div>
    <div class="main-right">
      <div class="main-datetime">
        <div class="main-time" id="mainTime"></div>
        <div class="main-date" id="mainDate"></div>
      </div>
      <button class="edit-btn" onclick="tryOpenEdit()">✏ 편집</button>
    </div>
  </div>
  <div class="notice-grid" id="noticeGrid"></div>
</div>

<!-- EDIT -->
<div id="editPage">
  <div class="edit-hdr">
    <div class="edit-logo">✏ 공지사항 편집</div>
    <div style="display:flex;align-items:center;gap:12px">
      <span style="font-size:12px;color:var(--dim)" id="editStatus"></span>
      <span style="font-size:12px;font-weight:700" id="syncStatus"></span>
      <button class="back-btn" onclick="goMain()">← 메인으로</button>
    </div>
  </div>
  <div class="edit-body">
    <div class="sidebar">
      <div class="sb-hdr">
        <div class="sb-title">점포 선택</div>
        <div class="sb-hint">클릭 선택 · 초록 체크 = 메인 표시</div>
      </div>
      <div class="store-list" id="storeList"></div>
    </div>
    <div class="edit-main" id="editMain"></div>
  </div>
</div>

<!-- PW 모달 -->
<div class="ov" id="pwOv" onclick="closePw(event)">
  <div class="modal">
    <div class="modal-t" id="pwTitle">🔒 관리자 로그인</div>
    <div class="modal-s" id="pwDesc">편집하려면 비밀번호를 입력하세요</div>
    <input class="pw-inp" id="pwInp" type="password" maxlength="20" placeholder="••••"
      onkeydown="if(event.key==='Enter')submitPw()"
      oninput="document.getElementById('pwErr').textContent=''">
    <div class="pw-err" id="pwErr"></div>
    <div class="modal-acts">
      <button class="btn btn-c" onclick="closePw()">취소</button>
      <button class="btn btn-s" onclick="submitPw()">확인</button>
    </div>
    <span class="pw-link" id="pwLink" onclick="startChangePw()">비밀번호 변경</span>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue, set, get } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyAL2fqMgZyU8QnMhuLnLVALZih6MWOBQvk",
  authDomain: "ssg-notice.firebaseapp.com",
  databaseURL: "https://ssg-notice-default-rtdb.firebaseio.com",
  projectId: "ssg-notice",
  storageBucket: "ssg-notice.firebasestorage.app",
  messagingSenderId: "181518386352",
  appId: "1:181518386352:web:f22b95b72bc2e22358e775"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ── STORES ── */
const STORES = [
  {id:'bon',   name:'본점',    short:'본',   color:'#60a5fa'},
  {id:'gg',    name:'경기점',  short:'경',   color:'#34d399'},
  {id:'uijb',  name:'의정부점',short:'의',   color:'#fbbf24'},
  {id:'busan', name:'부산점',  short:'부',   color:'#f87171'},
  {id:'gwangju',name:'광주점', short:'광',   color:'#a78bfa'},
  {id:'dj',    name:'대전점',  short:'대전', color:'#fb923c'},
  {id:'dg',    name:'대구점',  short:'대구', color:'#2dd4bf'},
];

const COLOR_PRESETS = [
  '#e5e7eb','#ffffff','#fcd34d','#6ee7b7','#93c5fd',
  '#f9a8d4','#fca5a5','#c4b5fd','#5eead4','#fdba74',
];

const SCALE_STEPS = [
  {v:.7,l:'70%'},{v:.8,l:'80%'},{v:.9,l:'90%'},{v:1,l:'100%'},
  {v:1.2,l:'120%'},{v:1.4,l:'140%'},{v:1.6,l:'160%'},{v:1.8,l:'180%'},
  {v:2,l:'200%'},{v:2.5,l:'250%'},{v:3,l:'300%'},{v:3.5,l:'350%'},
  {v:4,l:'400%'},{v:4.5,l:'450%'},{v:5,l:'500%'},
];

/* ── STATE ── */
const data = {};
STORES.forEach(s => data[s.id] = []);

const vis = {};
STORES.forEach(s => vis[s.id] = false);

const fontScale = {};
STORES.forEach(s => fontScale[s.id] = 1.0);

let curId = STORES[0].id;
let adminPw = '1111';
let pwMode = 'login';
let _saveTimer = null;

/* ── FIREBASE 저장/불러오기 ── */
function saveToFirebase(){
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(()=>{
    const payload = {};
    STORES.forEach(s=>{
      payload[s.id] = {
        notices: data[s.id],
        vis: vis[s.id],
        fontScale: fontScale[s.id]
      };
    });
    payload._adminPw = adminPw;
    set(ref(db,'ssgNotice'), payload)
      .then(()=> updateSyncStatus('saved'))
      .catch(()=> updateSyncStatus('error'));
  }, 600);
}

function updateSyncStatus(state){
  const el = document.getElementById('syncStatus');
  if(!el) return;
  if(state==='saved'){
    el.textContent='✅ 저장됨';el.style.color='#34d399';
    setTimeout(()=>{el.textContent='';},2500);
  } else if(state==='error'){
    el.textContent='⚠ 저장 실패';el.style.color='#f87171';
  } else if(state==='loading'){
    el.textContent='⏳ 불러오는 중...';el.style.color='#94a3b8';
  }
}

function loadFromFirebase(){
  updateSyncStatus('loading');
  onValue(ref(db,'ssgNotice'), (snapshot)=>{
    const val = snapshot.val();
    if(val){
      STORES.forEach(s=>{
        if(val[s.id]){
          data[s.id]   = val[s.id].notices   || [];
          vis[s.id]    = val[s.id].vis        || false;
          fontScale[s.id] = val[s.id].fontScale ?? 1.0;
        }
      });
      if(val._adminPw) adminPw = val._adminPw;
    }
    updateSyncStatus('');
    renderMain();
    // 편집 페이지 열려있으면 같이 갱신
    if(document.getElementById('editPage').style.display==='flex'){
      renderSidebar(); renderEditor(curId);
    }
  });
}

/* ── TIME ── */
function tick(){
  const n = new Date();
  const D = ['일','월','화','수','목','금','토'];
  document.getElementById('mainTime').textContent =
    `${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;
  document.getElementById('mainDate').textContent =
    `${n.getFullYear()}.${pad(n.getMonth()+1)}.${pad(n.getDate())} (${D[n.getDay()]})`;
}
function pad(n){return String(n).padStart(2,'0');}
setInterval(tick,1000); tick();

// 전역 노출 (onclick 핸들러에서 접근)
window.tryOpenEdit=()=>tryOpenEdit();
window.goMain=()=>goMain();
window.selectStore=(id)=>selectStore(id);
window.toggleVis=(id)=>toggleVis(id);
window.setScale=(id,v)=>setScale(id,v);
window.addNotice=(id)=>addNotice(id);
window.delNotice=(id,idx)=>delNotice(id,idx);
window.onEditorInput=(el)=>onEditorInput(el);
window.saveSelAndApply=(e,c)=>saveSelAndApply(e,c);
window.applyColor=(c)=>applyColor(c);
window.closePw=(e)=>closePw(e);
window.submitPw=()=>submitPw();
window.startChangePw=()=>startChangePw();

/* ── MAIN RENDER ── */
function activeStores(){
  return STORES.filter(s => vis[s.id] && data[s.id].some(n=>n.text.trim()));
}

function renderMain(){
  const list = activeStores();
  const grid = document.getElementById('noticeGrid');

  if(!list.length){
    grid.style.cssText='display:flex;align-items:center;justify-content:center';
    grid.innerHTML=`<div class="empty-state"><div style="font-size:48px;opacity:.2">📭</div><div style="font-size:18px;font-weight:700">표시할 공지사항이 없습니다</div><div style="font-size:13px;opacity:.5;margin-top:4px">편집 버튼을 눌러 공지를 추가하세요</div></div>`;
    return;
  }

  const n = list.length;

  // 행 분할 정의: [row1개수, row2개수]
  // 5개 → [3,2], 7개 → [4,3], 나머지는 단순 grid
  const splitMap = {5:[3,2], 7:[4,3]};

  if(splitMap[n]){
    // flexbox 2행으로 균등 분할
    const [r1,r2] = splitMap[n];
    const top = list.slice(0,r1);
    const bot = list.slice(r1);
    grid.style.cssText='display:flex;flex-direction:column';
    grid.innerHTML =
      `<div style="display:flex;flex:1;min-height:0">
        ${top.map((s,i)=>buildCard(s,n,i,r1,true)).join('')}
      </div>
      <div style="display:flex;flex:1;min-height:0">
        ${bot.map((s,i)=>buildCard(s,n,r1+i,r2,true)).join('')}
      </div>`;
  } else {
    // 1~4, 6개는 기존 css grid
    const colMap = {1:1,2:2,3:3,4:2,6:3};
    const rowMap = {1:1,2:1,3:1,4:2,6:2};
    const cols = colMap[n]||4, rows = rowMap[n]||2;
    grid.style.cssText=`display:grid;grid-template-columns:repeat(${cols},1fr);grid-template-rows:repeat(${rows},1fr)`;
    grid.innerHTML = list.map((s,i)=>buildCard(s,n,i,cols,false)).join('');
  }
}

// rowCount: 이 카드가 속한 행의 총 카드 수 (균등 flex 계산용)
// isFlex: true면 flex:1 사용
function buildCard(s,total,idx,rowCount,isFlex){
  const notices = data[s.id].filter(n=>n.text.trim());
  const sc = fontScale[s.id];
  const t = total;
  const hh  = t<=2?72:t<=4?60:52;
  const bsz = t<=2?32:t<=4?26:22;
  const nfs = t<=2?28:t<=4?22:18;
  const sfs = t<=2?14:t<=4?12:11;
  const tfs = Math.round((t<=2?20:t<=4?16:13)*sc);
  const tsz = t<=2?13:t<=4?12:10;
  const nsz = t<=2?30:t<=4?24:20;
  const ip  = t<=2?16:t<=4?12:8;
  const bp  = t<=2?28:t<=4?22:16;

  // flex 방식: 행 내 균등 분배
  const sizeStyle = isFlex
    ? 'flex:1;min-width:0;border-right:2px solid var(--border)'
    : '';

  const items = notices.map((item,ni)=>`
    <div class="notice-item" style="padding:${ip}px 0">
      <div class="notice-num" style="width:${nsz}px;height:${nsz}px;font-size:${nsz*.45}px;border-radius:${nsz*.25}px">${ni+1}</div>
      <div class="notice-text" style="font-size:${tfs}px">${item.html||esc(item.text)}</div>
      <div class="notice-ts" style="font-size:${tsz}px">${item.ts}</div>
    </div>`).join('');

  return `
    <div class="store-card" style="${sizeStyle};border-top:3px solid ${s.color}">
      <div class="store-hdr" style="height:${hh}px">
        <div style="width:${bsz*1.3}px;height:${bsz}px;font-size:${bsz*.45}px;border-radius:${bsz*.2}px;background:${s.color}22;color:${s.color};border:1.5px solid ${s.color}44;display:inline-flex;align-items:center;justify-content:center;font-weight:900">${s.short}</div>
        <div>
          <div style="font-size:${nfs}px;font-weight:900;color:var(--text)">${s.name}</div>
          <div style="font-size:${sfs}px;color:var(--dim);font-weight:600">공지 ${notices.length}건</div>
        </div>
        <div style="margin-left:auto;display:flex;align-items:center;gap:5px">
          <div style="width:6px;height:6px;border-radius:50%;background:${s.color}"></div>
          <span style="font-size:${sfs}px;color:${s.color};font-weight:800">NOTICE</span>
        </div>
      </div>
      <div class="store-body" style="padding:${bp}px ${bp+4}px">${items}</div>
    </div>`;
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }

/* ── PAGE SWITCH ── */
function tryOpenEdit(){
  pwMode='login'; openPwModal(()=>showEdit());
}
function showEdit(){
  document.getElementById('mainPage').style.display='none';
  document.getElementById('editPage').style.display='flex';
  renderSidebar(); renderEditor(curId);
}
function goMain(){
  document.getElementById('editPage').style.display='none';
  document.getElementById('mainPage').style.display='flex';
  renderMain();
}

/* ── SIDEBAR ── */
function renderSidebar(){
  document.getElementById('storeList').innerHTML = STORES.map(s=>{
    const hasData = data[s.id].some(n=>n.text.trim());
    const isVis = vis[s.id]&&hasData;
    const isCur = s.id===curId;
    return `<div class="store-item ${isCur?'active':''} ${isVis?'visible':''}" onclick="selectStore('${s.id}')">
      <div class="si-check">${isVis?'✓':''}</div>
      <div class="si-dot" style="background:${s.color}"></div>
      <div class="si-name" style="${isCur?'color:'+s.color:''}">${s.name}</div>
      <div class="si-cnt">${hasData?data[s.id].filter(n=>n.text.trim()).length+'건':''}</div>
    </div>`;
  }).join('');
}

function selectStore(id){ curId=id; renderSidebar(); renderEditor(id); }

/* ── EDITOR ── */
function renderEditor(id){
  const s = STORES.find(x=>x.id===id);
  const notices = data[id];
  const isVis = vis[id] && notices.some(n=>n.text.trim());
  const sc = fontScale[id];
  const main = document.getElementById('editMain');

  main.innerHTML = `
    <!-- 헤더 -->
    <div style="display:flex;align-items:center;gap:10px;flex-shrink:0">
      <div style="background:${s.color}22;color:${s.color};border:1.5px solid ${s.color}44;padding:0 9px;height:30px;border-radius:7px;font-size:12px;font-weight:900;display:inline-flex;align-items:center">${s.short}</div>
      <span style="font-size:18px;font-weight:900;color:var(--blue)">${s.name}</span>
      <button class="vis-btn ${isVis?'on':''}" onclick="toggleVis('${id}')">
        ${isVis?'✓ 메인 표시중':'메인에 표시'}
      </button>
    </div>

    <!-- 폰트 크기 -->
    <div class="font-panel">
      <div class="fp-title">📐 기본 폰트 크기 (전체 적용)</div>
      <div class="fp-btns">
        ${SCALE_STEPS.map(step=>`<button class="fp-btn ${Math.abs(sc-step.v)<.01?'active':''}" onclick="setScale('${id}',${step.v})">${step.l}</button>`).join('')}
        <span class="fp-cur">${Math.round(sc*100)}%</span>
      </div>
    </div>

    <!-- 색상 툴바 -->
    <div class="color-bar">
      <span class="cb-label">🎨 부분 색상</span>
      <div class="cb-sep"></div>
      ${COLOR_PRESETS.map(c=>`<div class="cb-swatch" style="background:${c}" title="${c}" onmousedown="saveSelAndApply(event,'${c}')"></div>`).join('')}
      <div class="cb-sep"></div>
      <input type="color" class="cb-picker" id="cpick_${id}" value="#ffffff"
        onmousedown="event.preventDefault()" onchange="applyColor(this.value)">
      <div class="cb-sep"></div>
      <button class="cb-clear" onmousedown="saveSelAndApply(event,'remove')">↩ 제거</button>
      <div class="cb-sep"></div>
      <span class="cb-hint">텍스트 드래그 후 색상 클릭</span>
    </div>

    <!-- 공지 목록 -->
    <div class="notices-wrap" id="nwrap_${id}">
      ${notices.length===0
        ? `<div class="edit-empty"><div style="font-size:40px;opacity:.2">📝</div><div style="font-size:14px;font-weight:700">공지사항이 없습니다</div></div>`
        : notices.map((item,i)=>`
          <div class="notice-row">
            <div class="nr-num">${i+1}</div>
            <div class="nr-editor"
              id="ed_${id}_${i}"
              contenteditable="true"
              placeholder="공지사항 내용을 입력하세요..."
              data-sid="${id}" data-idx="${i}"
              style="font-size:${Math.round(14*sc)}px"
              oninput="onEditorInput(this)"
            >${item.html||''}</div>
            <button class="nr-del" onclick="delNotice('${id}',${i})">✕</button>
          </div>`).join('')
      }
    </div>
    <button class="add-btn" onclick="addNotice('${id}')">＋ 공지 추가</button>
  `;
}

/* ── EDITOR ACTIONS ── */
let savedRange = null;

// 에디터 내 selection 변화 감지 → 저장
document.addEventListener('selectionchange', ()=>{
  const sel = window.getSelection();
  if(!sel||sel.rangeCount===0||sel.isCollapsed){ return; }
  const node = sel.getRangeAt(0).commonAncestorContainer;
  let el = node.nodeType===3?node.parentNode:node;
  while(el){ if(el.classList&&el.classList.contains('nr-editor')){ savedRange=sel.getRangeAt(0).cloneRange(); return; } el=el.parentNode; }
});

function saveSelAndApply(e, color){
  e.preventDefault(); // 포커스 빼앗기 방지
  if(color==='remove') applyColor('remove');
  else applyColor(color);
}

function applyColor(color){
  if(!savedRange||savedRange.collapsed){
    toast('색상을 적용할 텍스트를 먼저 드래그 선택하세요','warn'); return;
  }
  // selection 복원
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(savedRange);

  document.execCommand('styleWithCSS',false,true);
  if(color==='remove'||color==='inherit'){
    document.execCommand('removeFormat',false,null);
  } else {
    document.execCommand('foreColor',false,color);
  }

  // 에디터 찾아서 데이터 저장
  let container = savedRange.commonAncestorContainer;
  let el = container.nodeType===3?container.parentNode:container;
  while(el){ if(el.classList&&el.classList.contains('nr-editor')){ onEditorInput(el); break; } el=el.parentNode; }
  savedRange=null;
  saveToFirebase();
}

function onEditorInput(el){
  const id = el.dataset.sid;
  const idx = parseInt(el.dataset.idx);
  if(!data[id]||!data[id][idx]) return;
  data[id][idx].html = el.innerHTML;
  data[id][idx].text = el.innerText||el.textContent||'';
  const hasContent = data[id].some(n=>n.text.trim().length>0);
  if(!hasContent&&vis[id]){ vis[id]=false; renderSidebar(); }
  updateStatus();
  saveToFirebase();
}

function addNotice(id){
  const n=new Date();
  const ts=`${pad(n.getMonth()+1)}/${pad(n.getDate())} ${pad(n.getHours())}:${pad(n.getMinutes())}`;
  data[id].push({html:'',text:'',ts});
  renderEditor(id); renderSidebar();
  setTimeout(()=>{
    const eds=document.querySelectorAll('.nr-editor');
    if(eds.length) eds[eds.length-1].focus();
  },60);
  saveToFirebase();
}

function delNotice(id,idx){
  data[id].splice(idx,1);
  if(!data[id].some(n=>n.text.trim())) vis[id]=false;
  renderEditor(id); renderSidebar();
  saveToFirebase();
}

function toggleVis(id){
  if(!data[id].some(n=>n.text.trim())){ toast('공지사항을 먼저 입력하세요','warn'); return; }
  vis[id]=!vis[id];
  renderSidebar(); renderEditor(id);
  const s=STORES.find(x=>x.id===id);
  toast(`${s.name} ${vis[id]?'메인에 표시됩니다':'메인에서 숨겼습니다'}`,vis[id]?'ok':'info');
  saveToFirebase();
}

function setScale(id,v){
  fontScale[id]=v;
  renderEditor(id);
  saveToFirebase();
}

function updateStatus(){
  const total=STORES.filter(s=>vis[s.id]&&data[s.id].some(n=>n.text.trim())).length;
  const el=document.getElementById('editStatus');
  if(el) el.textContent=total?`메인 표시: ${total}개 점포`:'표시 중인 점포 없음';
}

/* ── TOAST ── */
function toast(msg,type='ok'){
  let t=document.getElementById('_toast');
  if(!t){t=document.createElement('div');t.id='_toast';t.style.cssText='position:fixed;bottom:32px;left:50%;transform:translateX(-50%);font-size:13px;font-weight:800;padding:10px 22px;border-radius:10px;z-index:9999;pointer-events:none;transition:opacity .3s';document.body.appendChild(t);}
  const col={ok:'#34d399',warn:'#fbbf24',info:'#94a3b8'}[type]||'#34d399';
  t.style.border=`1.5px solid ${col}`;t.style.color=col;t.style.background='var(--bg2)';
  t.textContent=msg;t.style.opacity='1';
  clearTimeout(t._t);t._t=setTimeout(()=>t.style.opacity='0',2400);
}

/* ── PASSWORD ── */
let _pwCb=null;
function openPwModal(cb){
  _pwCb=cb||null;
  const cfg={
    'login':      ['🔒 관리자 로그인','편집하려면 비밀번호를 입력하세요',true],
    'change-old': ['🔑 비밀번호 변경','현재 비밀번호를 입력하세요',false],
    'change-new': ['🔑 새 비밀번호','새 비밀번호를 입력하세요 (4자리 이상)',false],
  }[pwMode];
  document.getElementById('pwTitle').textContent=cfg[0];
  document.getElementById('pwDesc').textContent=cfg[1];
  document.getElementById('pwLink').style.display=cfg[2]?'block':'none';
  document.getElementById('pwInp').value='';
  document.getElementById('pwErr').textContent='';
  document.getElementById('pwOv').classList.add('open');
  setTimeout(()=>document.getElementById('pwInp').focus(),150);
}
function closePw(e){
  if(e&&e.target!==document.getElementById('pwOv'))return;
  document.getElementById('pwOv').classList.remove('open');
}
function submitPw(){
  const v=document.getElementById('pwInp').value;
  const err=s=>{document.getElementById('pwErr').textContent=s;document.getElementById('pwInp').value='';document.getElementById('pwInp').focus();};
  if(pwMode==='login'){
    if(v===adminPw){closePw();if(_pwCb){_pwCb();_pwCb=null;}}
    else err('비밀번호가 틀렸습니다');
  } else if(pwMode==='change-old'){
    if(v===adminPw){pwMode='change-new';openPwModal();}
    else err('현재 비밀번호가 틀렸습니다');
  } else if(pwMode==='change-new'){
    if(v.length<4){document.getElementById('pwErr').textContent='4자리 이상 입력하세요';return;}
    adminPw=v;pwMode='login';closePw();toast('✅ 비밀번호가 변경되었습니다','ok');
    saveToFirebase();
  }
}
function startChangePw(){closePw();pwMode='change-old';setTimeout(openPwModal,200);}

/* ── INIT ── */
loadFromFirebase();
</script>
